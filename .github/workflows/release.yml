name: Build Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      app_version:
        description: "App version for jpackage (X.Y.Z, no SNAPSHOT). Leave blank to use 1.0.1."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    # Per-job timeout caps the macos-13 (Intel) job at 60 min so a scarce
    # Intel-runner queue can't hold the release open forever. The fast jobs
    # finish in <15 min, so this is only relevant when Apple-Silicon-only
    # runner pools delay an Intel pick-up.
    timeout-minutes: ${{ matrix.timeout_minutes }}
    # macos-13 Intel availability fluctuates; let the other three platforms
    # publish even if Intel ends up timing out. The user can re-run just the
    # X-Men-x64.dmg job from the workflow page when capacity returns.
    continue-on-error: ${{ matrix.continue_on_error }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            package_type: EXE
            asset_name: X-Men.exe
            artifact_glob: target/dist/*.exe
            timeout_minutes: 45
            continue_on_error: false
          # Intel-Mac (macos-13) builds the x86_64 .dmg on a runner that runs
          # natively on Apple Silicon (macos-14) by routing the entire JDK +
          # jpackage toolchain through Rosetta 2 with `arch -x86_64`. The
          # macos-13 hosted-runner pool was consistently failing to pick up
          # jobs (>8 h queue), so the previous matrix entry timed the release
          # out instead of publishing. macos-14 has reliable capacity.
          - os: macos-14
            arch: x64
            package_type: DMG
            asset_name: X-Men-x64.dmg
            artifact_glob: target/dist/*.dmg
            timeout_minutes: 60
            continue_on_error: false
          - os: macos-14          # Apple Silicon runner — produces an arm64 .dmg natively
            arch: arm64
            package_type: DMG
            asset_name: X-Men-arm64.dmg
            artifact_glob: target/dist/*.dmg
            timeout_minutes: 45
            continue_on_error: false
          - os: ubuntu-latest
            package_type: DEB
            asset_name: X-Men.deb
            artifact_glob: target/dist/*.deb
            timeout_minutes: 30
            continue_on_error: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (host arch)
        if: matrix.arch != 'x64' || runner.os != 'macOS'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # For the Intel-Mac dmg: install the x86_64 Temurin 21 JDK on the
      # Apple-Silicon runner. The whole build then runs under Rosetta 2
      # (via `arch -x86_64 …`) so jpackage produces an x86_64 launcher and
      # bundles an x86_64 JRE — the resulting .dmg runs natively on Intel
      # Macs without Rosetta.
      - name: Set up x86_64 JDK 21 (Intel Mac cross-arch)
        if: matrix.arch == 'x64' && runner.os == 'macOS'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          architecture: x64
          cache: maven

      - name: Make Maven wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./mvnw

      # The repo ships a pre-built .icns generated from the master logo, but
      # regenerate it on the macOS runner with the OS-native `iconutil` so the
      # produced .icns always matches the Apple-recommended layout (one-time
      # cost; the rest of the build does not care).
      - name: Refresh macOS app icon via iconutil
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          iconset=target/x-men.iconset
          mkdir -p "$iconset"
          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" src/main/resources/packaging/x-men-icon.png --out "$iconset/icon_${size}x${size}.png"
            sips -z "$((size * 2))" "$((size * 2))" src/main/resources/packaging/x-men-icon.png --out "$iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns "$iconset" -o src/main/resources/packaging/x-men-icon.icns

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot

      - name: Resolve app version
        id: appver
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${{ github.event.inputs.app_version }}"
          fi
          if [[ ! "$v" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
            v="1.0.1"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Using app version: $v"

      # The OS-aware profiles in pom.xml pick the right --icon for each
      # platform, so callers only need -Djpackage.type and -Djpackage.appVersion.
      # The Intel-Mac job wraps the whole build in `arch -x86_64` so jpackage
      # and Maven run under Rosetta 2 and emit x86_64 binaries.
      - name: Build installer
        shell: bash
        run: |
          if [[ "${{ matrix.arch }}" == "x64" && "$RUNNER_OS" == "macOS" ]]; then
            arch -x86_64 ./mvnw -B -ntp -P installer \
              -Djpackage.type=${{ matrix.package_type }} \
              -Djpackage.appVersion=${{ steps.appver.outputs.version }} \
              -DskipTests \
              clean package
          else
            ./mvnw -B -ntp -P installer \
              -Djpackage.type=${{ matrix.package_type }} \
              -Djpackage.appVersion=${{ steps.appver.outputs.version }} \
              -DskipTests \
              clean package
          fi

      - name: Normalize asset name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob
          matches=( ${{ matrix.artifact_glob }} )
          if [ ${#matches[@]} -ne 1 ]; then
            echo "Expected exactly one installer matching '${{ matrix.artifact_glob }}', found ${#matches[@]}"
            ls -R target/dist || true
            printf '%s\n' "${matches[@]}"
            exit 1
          fi
          cp "${matches[0]}" "release-assets/${{ matrix.asset_name }}"
          ls -la release-assets

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release-assets/${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Upload GitHub Release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release-assets/${{ matrix.asset_name }}
