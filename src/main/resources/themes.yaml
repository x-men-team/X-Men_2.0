# X-Men Themes
# -------------------------------------------------------------------
# A theme = a colour palette applied to the JavaFX UI and (optionally)
# served back to web clients via /api/settings/themes.
#
# Fields:
#   id           – stable identifier used by the API and CSS classes
#   name         – human-readable label shown in the settings dialog
#   accent       – primary accent colour
#   accent-soft  – muted variant used on hover/secondary states
#   overlay      – translucent overlay drawn over the background video
#   glass-fill   – translucent fill of glass panels
#   glass-stroke – soft border of glass panels
#   text         – primary text colour
#   text-muted   – secondary text colour
#   shadow       – drop-shadow colour for elevated panels
#
# Every colour must be a valid JavaFX/CSS colour.
# -------------------------------------------------------------------

xmen:
  themes:
    default: "classic"

