spring:
  config:
    import:
      - optional:file:.env[.properties]
      - classpath:vocabulary.yaml
      - classpath:themes.yaml
  application:
    name: ${APP_NAME:X-Men}
  main:
    headless: false
    log-startup-info: true
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0

server:
  port: ${SERVER_PORT:8081}

logging:
  level:
    root: INFO
    web: DEBUG
    org.springframework.web: DEBUG


# Actuator / Health configuration
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}
  health:
    livenessstate:
      enabled: true

# Application specific properties
app:
  cors:
    # Reads from APP_CORS_ALLOWED_ORIGINS (.env or environment); falls back to fixed localhost list
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:8082,http://localhost:8083,http://localhost:5173}

# External Derivation Service Configuration
derivation:
  service:
    url: ${DERIVATION_SERVICE_URL:http://localhost:9091}
