entries:
  - id: manual.xmen2.overview
    title: X-Men 2.0 manual overview
    category: manual
    terms: [X-Men 2.0, XMen 2.0, X Men 2, what is X-Men 2.0, explain X-Men 2.0, what does X-Men do, X-Men overview, project overview, manual overview]
    shortAnswer: |
      X-Men 2.0 is a Java 21 and Spring Boot based tool for generating mutated Tamarin ceremony models.
    definition: |
      The manual describes X-Men 2.0 as a re-engineered and extended mutation generator for security ceremonies. It takes `.spthy` ceremony specifications, applies selected human-behavior mutations, writes mutated ceremony models, and relies on Tamarin Prover for formal analysis.
    details:
      - "A security ceremony extends a protocol with human users, systems, communication channels, and user actions."
      - "Mutations model unexpected, incorrect, or missing human behavior during the ceremony."
      - "The tool is built on top of Tamarin Prover and generates mutated ceremony theories for later verification."
      - "Case studies include Oyster Card, SAML SSO, and Coach Service ticket inspection."
      - "The manual covers local setup, mutation operation, helper services, model classes, integration tests, project structure, advanced Forget/derivation logic, troubleshooting, FAQs, glossary, and acronyms."
    why: |
      Use this source for questions about how X-Men 2.0 is implemented and operated, especially when the question names Java services, model classes, generated files, tests, or setup commands.
    related: [manual.architecture.backend-flow, manual.local-build, manual.mutation.workflow]
    followups:
      - What is the X-Men mutation workflow?
      - What are the X-Men case studies?
      - How do I build X-Men 2.0?

  - id: manual.security-ceremony
    title: Security ceremony
    category: concept
    terms: [security ceremony, ceremony definition, protocol with human users, human ceremony, ceremony vs protocol, what is a security ceremony, explain ceremony, why ceremony not protocol, human in protocol, human user model, socio technical ceremony]
    definition: |
      A security ceremony is a security protocol extended with explicit human users and their interactions with computing systems.
    details:
      - "Ceremonies include messages, data, communication channels, and user actions."
      - "The human participant is modeled as part of the system, not as an external assumption."
      - "This matters because vulnerabilities can come from user mistakes even when the cryptographic protocol is sound."
      - "Typical domains include payment, voting, authentication, transport, and critical infrastructure."
    why: |
      X-Men exists because human behavior can change the security outcome of a ceremony; mutations are the mechanism for exploring those changes.
    related: [manual.mutation.definition, manual.xmen2.overview]
    followups:
      - What is a mutation?
      - What is a human rule?
      - What is a Tamarin theory?

  - id: manual.mutation.definition
    title: Mutation in X-Men 2.0
    category: mutation
    terms: [mutation definition, mutation in X-Men, human mutation, user mistake, mutated ceremony, what is a mutation, explain mutation, what does mutation mean, human behavior mistake, altered ceremony behavior, wrong human action, deviation from ceremony]
    definition: |
      A mutation models a potential mistake or altered behavior by a human participant compared with the behavior specified in the original ceremony.
    details:
      - "Examples include skipping actions, adding extra sends, replacing messages, neglecting checks, or forgetting knowledge."
      - "The result is a mutated ceremony model that can be analyzed for changed security properties."
      - "Mutated rules are marked as mutated and commonly receive an `M` suffix."
      - "X-Men also updates later rules so the mutated trace remains structurally executable."
    why: |
      Mutations let analysts test whether a ceremony remains secure when human behavior deviates from the ideal flow.
    related: [manual.skip.overview, manual.add.overview, manual.replace.overview, manual.forget.overview]
    followups:
      - What mutations are available?
      - What is Skip Send Receive?
      - What is Replace Type?

  - id: manual.architecture.backend-flow
    title: X-Men architecture flow
    category: architecture
    terms: [X-Men architecture, backend flow, mutation generator architecture, service layer, model classes, mutated file generator, how X-Men is structured, explain architecture flow, how request becomes mutated file, service helper model flow, components of X-Men]
    definition: |
      X-Men 2.0 routes a mutation request through controller components, service-layer logic, model objects, helper utilities, and a mutated-file generator.
    details:
      - "Mutation Generator represents the application repository and starts mutated file generation through internal layers."
      - "Spring Boot controllers accept requests, extract inputs, configure mutation flags, and delegate to services."
      - "The Service Layer contains the mutation business logic and coordinates model parsing, mutation strategies, and file generation."
      - "The Mutated File Generator writes reconstructed mutated theories, including preamble, functions, builtins, rules, and postamble."
      - "Model classes define facts, rules, values, variables, functions, and mutation state."
      - "Utility functions support cloning, file handling, data processing, state rebuilding, and recursive propagation."
    why: |
      This flow explains why a mutation question may involve multiple classes: parsing, tagging, strategy selection, rule rewriting, propagation, and output generation are separated.
    related: [manual.service-layer, manual.model-classes, manual.mutated-file-generator]
    followups:
      - What does MutationGeneratorService do?
      - What does MutatedFileGenerator do?
      - What does ParametersBundle store?

  - id: manual.tamarin.role
    title: Tamarin in X-Men 2.0
    category: tamarin
    terms: [Tamarin Prover role, Tamarin in X-Men, mutated files in Tamarin, analyze mutated ceremony, why does X-Men use Tamarin, what happens after mutation generation, where does Tamarin fit, Tamarin analysis stage]
    definition: |
      Tamarin Prover is the formal verification tool used to analyze the mutated ceremony models generated by X-Men 2.0.
    details:
      - "X-Men generates mutated `.spthy` ceremony theories."
      - "The generated theories are analyzed in Tamarin to identify possible vulnerabilities."
      - "The manual positions Tamarin as the analysis stage after mutation generation."
      - "X-Men focuses on creating behavior variants; Tamarin checks the resulting formal model."
    why: |
      X-Men is not a replacement for Tamarin. It prepares mutated models so Tamarin can verify whether the changed ceremony still satisfies its security goals.
    related: [manual.spthy.file, manual.mutated-file-generator, manual.derivation.check]
    followups:
      - What is a .spthy file?
      - How are mutated files generated?
      - What is a Tamarin theory?

  - id: manual.case-studies
    title: X-Men 2.0 case studies
    category: case-study
    terms: [X-Men case studies, case studies in manual, X-Men 2.0 manual case studies, Oyster SSO Coach, evaluated ceremonies, what examples are in the manual, what ceremonies were tested, case study list, Oyster Google SSO Coach examples]
    definition: |
      The manual evaluates X-Men 2.0 on three ceremonies: Oyster Card, SAML-based SSO for Google Apps, and a Coach Service ticket ceremony.
    details:
      - "Oyster Card models passenger, entrance gate, and exit gate interactions."
      - "SAML SSO models a client, service provider, and identity provider."
      - "Coach Service models customer, server-side ticket issuing, and driver inspection."
      - "Each case study highlights how realistic human or implementation deviations can become security-relevant."
    why: |
      These examples ground the mutation categories in concrete ceremonies where missing steps, simplified data, or weak checks produce meaningful attacks.
    related: [manual.case.oyster, manual.case.saml, manual.case.coach]
    followups:
      - What is the Oyster case study?
      - What is the SAML SSO case study?
      - What is the Coach Service case study?

  - id: manual.case.oyster
    title: Oyster Card case study
    category: case-study
    terms: [Oyster Card ceremony manual, Oyster case study, touch in touch out, GateIn GateOut, card clash]
    definition: |
      The Oyster Card case study models a passenger using a contactless card with an entrance gate and an exit gate.
    details:
      - "The passenger touches the card at the entrance and sends the card number to GateIn."
      - "GateIn writes an identifier to the card and responds with that identifier."
      - "At exit, the passenger sends the card number, balance, and entrance gate identifier to GateOut."
      - "GateOut calculates the fare, updates the balance, and sends the new balance to the passenger."
      - "The model abstracts low-level cryptography to focus on user actions and vulnerabilities."
      - "Highlighted issues include forgetting to touch in or out and card clash from tapping multiple cards at once."
    why: |
      Oyster demonstrates how shifting responsibility to a human can create incomplete journeys, maximum fares, unintended payments, or double charges.
    related: [manual.forget.overview, manual.skip.overview]
    followups:
      - What is Forget in the Oyster example?
      - What is Skip Receive?
      - What is a security ceremony?

  - id: manual.case.saml
    title: SAML SSO case study
    category: case-study
    terms: [SAML SSO manual, Google Apps SSO case, AuthAssert, service provider identity provider, SSO vulnerability]
    definition: |
      The SAML SSO case study models authentication among a client, a service provider, and an identity provider.
    details:
      - "The client requests a resource from the service provider."
      - "The service provider sends an authentication request to the identity provider."
      - "After successful authentication, the identity provider issues a digitally signed assertion."
      - "The service provider verifies the assertion and grants resource access."
      - "The 2008 Google Apps simplification removed ID and SP fields from `AuthAssert(ID, C, IdP, SP)`, yielding `AuthAssert(C, IdP)`."
      - "That simplification let a malicious service provider reuse an assertion to impersonate the client at another service provider."
    why: |
      The case study shows why removing contextual fields for efficiency can enable a man-in-the-middle attack and why assertions should remain unique and context-specific.
    related: [manual.replace.overview, manual.replace.submessages, manual.replace.type]
    followups:
      - What is Replace Submessages?
      - What is Replace Type?
      - What is a submessage?

  - id: manual.case.coach
    title: Coach Service case study
    category: case-study
    terms: [Coach Service ceremony manual, e ticket case study, driver ticket inspection, forged ticket, paper ticket]
    definition: |
      The Coach Service case study models ticket inspection for paper tickets and electronic tickets.
    details:
      - "Customers can buy paper tickets at stations, shops, or from the driver."
      - "Customers can also buy electronic tickets with fields such as customer name, ticket number, journey details, barcode, or QR code."
      - "The modeled roles are Customer, ticket issuing service, and Driver."
      - "The customer selects and pays for a journey, receives an encrypted ticket, and presents it during boarding."
      - "Drivers may check unique details against an authorized list or scan visual fields if present."
      - "Weak inspection can allow attackers to travel using forged tickets."
    why: |
      Coach Service demonstrates that a credential can be present but still fail if the human check is superficial or ignores uniqueness.
    related: [manual.neglect.definition, manual.case-studies]
    followups:
      - What is Neglect?
      - What is a case study?
      - What is a human rule?

  - id: manual.local-build
    title: Build and run X-Men 2.0
    category: setup
    terms: [build X-Men 2.0, run X-Men 2.0, local setup, Java 21 Maven, mvn spring-boot run, how do I run X-Men, how do I build X-Men, setup steps, install Java Maven, start the application, local build commands]
    definition: |
      X-Men 2.0 is built with Java 21, Maven, and Spring Boot.
    steps:
      - "Install Java 21 and Maven."
      - "Set `JAVA_HOME` to the Java installation path and `MAVEN_HOME` to the Maven installation path."
      - "Add the Java and Maven `bin` directories to the system path."
      - "Install Git and verify it with `git --version`."
      - "Clone the repository and enter the project directory."
      - "Run `mvn clean install` to build the project."
      - "Run `mvn spring-boot:run` to start the Spring Boot application."
    details:
      - "On Windows, configure variables through Advanced system settings and Environment variables."
      - "On macOS, export `JAVA_HOME`, `MAVEN_HOME`, and update `PATH` in the shell profile."
      - "A non-headless launch can use `mvn spring-boot:run \"-Dspring-boot.run.jvmArguments=-Djava.awt.headless=false\"`."
      - "The Postman collection is located at `src/main/resources/X-Men.postmancollection.json`."
    why: |
      Build problems are usually environmental: Java version, Maven path, dependency download, or project import configuration.
    related: [manual.troubleshoot.build, manual.troubleshoot.tests]
    followups:
      - Why does the Maven build fail?
      - How do I run tests?
      - Where are dependencies defined?

  - id: manual.technical-upgrades
    title: X-Men 2.0 technical upgrades
    category: architecture
    terms: [technical upgrades, Java 21 upgrade, Spring Boot upgrade, Maven based project, integration tests MockMvc]
    definition: |
      X-Men 2.0 upgrades the earlier tool into a Java 21, Spring Boot, Maven-based, modular application with documented code and integration tests.
    details:
      - "Java 21 improves performance, security patch level, and developer productivity."
      - "Spring Boot simplifies configuration, startup, and service-oriented development."
      - "Maven centralizes dependency management and supports repeatable builds."
      - "The modular repository separates controller, service, helper, and model responsibilities."
      - "Integration tests use MockMvc to verify endpoints and generated outputs."
      - "Javadocs and readable implementation structure support onboarding and maintenance."
    why: |
      These upgrades explain why mutation behavior is now distributed across strategies, services, controllers, and model classes instead of one monolithic implementation.
    related: [manual.service-layer, manual.integration-tests]
    followups:
      - What is the service layer?
      - What is MockMvc used for?
      - What is MutationStrategyFactory?

  - id: manual.mutation.workflow
    title: Mutation workflow
    category: mutation
    terms: [mutation workflow, how mutations are generated, generated mutated model, mutation processing flow, how does X-Men generate mutants, from spthy to mutated file, mutation pipeline, mutation generation steps, how are output files created]
    definition: |
      The mutation workflow parses a `.spthy` ceremony, selects mutation strategies, rewrites human rules, propagates changes, and writes mutated theories.
    steps:
      - "Receive a ceremony specification file and selected mutation options."
      - "Split the file into preamble, rules, and postamble sections where needed."
      - "Load the rules through the Tamarin parser into Java model objects."
      - "Set mutation flags in `ParametersBundle`."
      - "Choose mutation strategies through `MutationStrategyFactory`."
      - "Clone and mutate eligible human rules."
      - "Propagate state, receive, send, and action changes through dependent rules."
      - "Reconstruct and write mutated output files."
    details:
      - "The original theory is cloned to isolate mutations from the base ceremony."
      - "Mutated rules are marked with an `M` suffix and `Type.MUTATED`."
      - "State updates are rebuilt so later rules remain aligned."
      - "Generated files are stored through `MutatedFileGenerator`."
    why: |
      This is why X-Men answers should not treat a mutation as a simple text replacement; the tool rewrites structured model objects and then repairs dependent state.
    related: [manual.file-splitter, manual.model-loader, manual.mutated-file-generator]
    followups:
      - What does FileSplitterService do?
      - What does ModelLoader do?
      - What does MutatedFileGenerator do?

  - id: manual.skip.overview
    title: Skip mutation implementation
    category: mutation
    terms: [Skip mutation manual, skip implementation, skipping Snd Rcv, skip strategy variants, how Skip is implemented, what does Skip remove, skip workflow, skipped send receive implementation]
    definition: |
      Skip mutation omits selected message-handling operations, such as `Snd` or `Rcv`, to test whether a ceremony remains robust when expected human steps are missing.
    details:
      - "The strategy clones the original theory to isolate mutations."
      - "Mutated rules receive an `M` suffix and are marked `Type.MUTATED`."
      - "Utility functions support cloning, state rebuilding, and variable analysis."
      - "The `ParametersBundle` tracks the mutated rules and generated collections."
      - "Required facts are validated before mutation; missing preconditions are logged as warnings or errors."
    why: |
      Skip is about missing actions, not wrong values. It removes or suppresses actions and then adapts later state so the mutated trace can still be analyzed.
    related: [manual.skip.send, manual.skip.receive, manual.skip.receive-send, manual.skip.send-receive]
    followups:
      - What is Skip Send?
      - What is Skip Receive Send?
      - What is Skip Receive Send Receive?

  - id: manual.skip.send
    title: Skip Send
    category: mutation
    terms: [Skip Send manual, Skip-Send, SkipSendMutationStrategy, skip Snd, remove send action]
    definition: |
      Skip Send removes a human `Snd` operation from a rule.
    details:
      - "It removes `Snd` postconditions and `To` actions."
      - "It adjusts variables that depended on the skipped send."
      - "It uses `SkipSendMutationStrategy`."
      - "The state and later rules may need alignment so the ceremony remains executable."
    why: |
      Use Skip Send when modeling a human who should send a message but fails to do so.
    related: [manual.skip.overview, manual.skip.send-receive]
    followups:
      - What is Skip Send Receive?
      - What is Snd?
      - How does propagation work?

  - id: manual.skip.receive
    title: Skip Receive
    category: mutation
    terms: [Skip Receive manual, Skip-Receive, SkipReceiveMutationStrategy, skip Rcv, remove receive action]
    definition: |
      Skip Receive removes a human `Rcv` operation from a rule.
    details:
      - "It removes `Rcv` preconditions and `From` actions."
      - "It rebuilds `State` postconditions to reflect the missing receive."
      - "It uses `SkipReceiveMutationStrategy`."
      - "It is different from Forget, because the receive event itself is skipped rather than received and then forgotten."
    why: |
      Use Skip Receive when modeling a human who never receives or processes an expected incoming message.
    related: [manual.skip.overview, manual.forget.overview]
    followups:
      - How is Skip Receive different from Forget?
      - What is Rcv?
      - What is State?

  - id: manual.skip.receive-send
    title: Skip Receive Send
    category: mutation
    terms: [Skip Receive Send manual, Skip-Receive-Send, SkipReceiveSendMutationStrategy, skip receive then send, receive send variant]
    definition: |
      Skip Receive Send skips both the receive action and the send action that would normally follow within the same human subtrace.
    details:
      - "It removes the `Rcv` side and the later `Snd` side from the affected rule sequence."
      - "It also removes related `From` and `To` action facts."
      - "It updates state facts when the removed receive/send pair affected knowledge."
      - "It uses `SkipReceiveSendMutationStrategy`."
    why: |
      This variant is specific: it starts with a receive, then removes the send that depends on that receive. A spaced or misspelled query should still resolve here, not to generic Skip.
    related: [manual.skip.receive, manual.skip.send]
    followups:
      - What is Skip Send Receive?
      - What is Skip Receive Send Receive?
      - How does X-Men update state after Skip?

  - id: manual.skip.receive-send-receive
    title: Skip Receive Send Receive
    category: mutation
    terms: [Skip Receive Send Receive manual, Skip-Receive-Send-Receive, SkipReceiveSendReceiveMutationStrategy, chained skip receive send receive]
    definition: |
      Skip Receive Send Receive skips a chained sequence where a receive is skipped in the original rule and subsequent send/receive operations in dependent rules are also skipped.
    details:
      - "It propagates state updates across a chain of related rules."
      - "It is designed for cases where removing the first receive invalidates later message handling."
      - "It uses `SkipReceiveSendReceiveMutationStrategy`."
      - "Dependent state facts and grouped parameters must be adjusted recursively."
    why: |
      This variant represents a longer behavioral cascade rather than a single missing action.
    related: [manual.skip.receive-send, manual.skip.propagation]
    followups:
      - What is propagation?
      - What is Skip Receive Send?
      - How are integration tests written for Skip?

  - id: manual.skip.send-receive
    title: Skip Send Receive
    category: mutation
    terms: [Skip Send Receive manual, Skip-Send-Receive, SkipSendReceiveMutationStrategy, skip send then receive, dependent receive]
    definition: |
      Skip Send Receive skips a human send in one rule and the corresponding receive in arriving or dependent rules.
    details:
      - "It starts with a send-side omission."
      - "It uses `findNextRules` to identify dependent arrival rules."
      - "It removes or marks related `Snd`, `Rcv`, `To`, and `From` facts as removed."
      - "It uses `SkipSendReceiveMutationStrategy`."
    why: |
      This variant models a missing outgoing message and the downstream receive that would no longer make sense.
    related: [manual.skip.send, manual.skip.receive-send, manual.skip.propagation]
    followups:
      - What is Skip Receive Send?
      - What is findNextRules?
      - What is Snd?

  - id: manual.skip.propagation
    title: Skip propagation
    category: mutation
    terms: [Skip propagation, buildNewState, previousRuleFact, PSpecial update, Value parameter update, postSndVariables]
    definition: |
      Skip propagation recursively updates later rules after a send or receive operation has been removed.
    details:
      - "X-Men rebuilds `State` postconditions using `UtilityFunctions.buildNewState`."
      - "It aligns later preconditions with modified states such as `previousRuleFact`."
      - "It removes variables tied to skipped actions, such as `postSndVariables`."
      - "It adjusts `PSpecial` groups and `Value` parameters in dependent facts."
      - "It stores the resulting mutated rules in `ParametersBundle` collections."
    why: |
      Without propagation, the mutated trace could contain impossible later receives, stale variables, or inconsistent state facts.
    related: [manual.utility-functions, manual.parameters-bundle]
    followups:
      - What does buildNewState do?
      - What is ParametersBundle?
      - What are PSpecial values?

  - id: manual.add.overview
    title: Add mutation implementation
    category: mutation
    terms: [Add mutation manual, Add-Mutation, AddMutationStrategy, add new send, knowledge permutations, how Add is implemented, Add workflow, how Add creates messages, Add power set, extra send implementation]
    definition: |
      Add mutation inserts additional send behavior derived from the human participant's current knowledge.
    details:
      - "The input `.spthy` file is split into sections using `FileSplitterService`."
      - "The rule section is wrapped into an in-memory file object for loading."
      - "The target rule is cloned and marked with an `M` suffix."
      - "State, `Rcv`, and `Snd` facts are identified and processed."
      - "Unused variables are removed by comparing send and receive parameters."
      - "The mutated rule can re-inject receive actions while clearing other actions."
    why: |
      Add tests whether additional information sent by a human, even if redundant or derived from knowledge, changes the ceremony outcome.
    related: [manual.add.permutations, manual.add.arrival-adaptation]
    followups:
      - How does Add generate permutations?
      - How does Add adapt arrival rules?
      - What is FileSplitterService?

  - id: manual.add.permutations
    title: Add mutation knowledge permutations
    category: mutation
    terms: [Add knowledge permutations, non-empty subsets, State PSpecial, role based add mutation, Add permutations]
    definition: |
      Add mutation extracts knowledge from the `State` fact and generates non-empty subsets of that knowledge as candidate messages.
    details:
      - "Knowledge content is read from the `State` fact's `PSpecial` parameter."
      - "The tool generates all non-empty subsets of knowledge indices, such as `0`, `01`, or `12`."
      - "For each permutation, X-Men constructs `Snd` facts."
      - "For each role, it updates the receiver parameter and adds the mutated `Snd` fact to postconditions and actions."
    why: |
      The permutation step is what makes Add exhaustive over possible extra messages from the human's current knowledge.
    related: [manual.add.overview, manual.pspecial]
    followups:
      - What is PSpecial?
      - What is State?
      - What is Snd?

  - id: manual.add.arrival-adaptation
    title: Add mutation arrival rule adaptation
    category: mutation
    terms: [Add arrival rule adaptation, Add propagation, convert Snd to Rcv, rebuild State after Add]
    definition: |
      After Add creates extra send facts, X-Men adapts arrival and subsequent rules so the extra message can be represented consistently.
    details:
      - "Generated `Snd` messages are converted to `Rcv` preconditions in arrival rules."
      - "Existing `Rcv` preconditions may be replaced or new ones added."
      - "Legacy `Rcv`, `Snd`, and `Commit` actions can be marked as removed."
      - "New receive actions are injected and `State` postconditions are rebuilt."
      - "Subsequent rules are updated recursively, including state index increments."
    why: |
      Add is not only an extra send; it also needs a matching receive-side model for later ceremony state.
    related: [manual.add.overview, manual.skip.propagation]
    followups:
      - What is mutation propagation?
      - What is State?
      - What is Commit?

  - id: manual.replace.overview
    title: Replace mutation implementation
    category: mutation
    terms: [Replace mutation manual, Replace-Mutation, ReplaceMutationService, Replace Type, Replace Sub Messages, how Replace is implemented, Replace workflow, wrong same type value, partial message variant, replacement service]
    definition: |
      Replace mutation changes the message sent by a human either by substituting a same-type value or by sending a submessage of the original message.
    details:
      - "The original theory is cloned so the base ceremony is preserved."
      - "The implementation supports `replaceType` and `replaceSubmessages` flags."
      - "Values are extracted from the `Snd` postcondition."
      - "Extraction handles `PSpecial` groups, variables explored through `UtilityFunctions`, and single `Value` instances."
      - "Replacement changes are propagated through later `State`, `Rcv`, `Snd`, and action facts."
    why: |
      Replace captures humans sending the wrong but structurally related data, or sending only part of what should have been sent.
    related: [manual.replace.type, manual.replace.submessages, manual.replace.propagation]
    followups:
      - What is Replace Type?
      - What is Replace Submessages?
      - How does Replace propagate?

  - id: manual.replace.type
    title: Replace Type
    category: mutation
    terms: [Replace Type manual, Replace Type from the X-Men manual, define Replace Type from the X-Men manual, Replace-Type, replaceType, same type different name, type replacement, same type different name Mutants]
    definition: |
      Replace Type swaps a sent value with another value from the human state knowledge that has the same type but a different name.
    details:
      - "The workflow compares `State` postcondition knowledge with `Snd` parameters."
      - "A valid replacement has a matching tag or type but a different value name."
      - "The implementation creates `Mutants` pairs containing old and new values."
      - "It updates actions and `Snd` postconditions in cloned rules."
      - "Complex cases use `UtilityFunctions.checkFunctionReplacement`."
    why: |
      Replace Type models confusion between values of the same kind, such as one key-like or password-like value being used instead of another.
    related: [manual.mutants, manual.replace.propagation]
    followups:
      - What are Mutants?
      - What is Replace Submessages?
      - What is checkFunctionReplacement?

  - id: manual.replace.submessages
    title: Replace Submessages
    category: mutation
    terms: [Replace Submessages manual, Replace-Sub-Messages, replaceSubmessages, submessage replacement, partial message variants]
    definition: |
      Replace Submessages generates partial-message variants by selecting subsets of the original sent message parameters.
    details:
      - "It generates power-set permutations of `Snd` parameter indices, such as `0` or `01`."
      - "It uses `generateArrayofValuetoSend` to map selected indices to values."
      - "It updates `Snd` postconditions with the new partial content."
      - "It propagates changes by aligning `Rcv` preconditions and rebuilding state."
    why: |
      This mutation models a human sending only part of a required structured message while preserving enough format to remain meaningful.
    related: [manual.replace.overview, manual.submessage, manual.replace.propagation]
    followups:
      - What is a submessage?
      - How does Replace Type differ?
      - What is PSpecial?

  - id: manual.replace.propagation
    title: Replace propagation
    category: mutation
    terms: [Replace propagation, propagationReplace, propagationReplaceSubmessages, ensureConsistency, switchFlag]
    definition: |
      Replace propagation recursively updates later rules after a value or submessage has changed.
    details:
      - "For type replacement, `propagationReplace` updates preconditions, actions, `State`, `Rcv`, and `Snd` facts."
      - "For submessage replacement, `propagationReplaceSubmessages` aligns receive-side content with the modified send."
      - "State postconditions are rebuilt through `UtilityFunctions.buildNewState`."
      - "`ensureConsistency` keeps `State` and `Rcv` agents aligned."
      - "`ReplaceTypeStrategy` and `ReplaceSubMessagesStrategy` delegate to `ReplaceMutationService` and set `switchFlag`."
    why: |
