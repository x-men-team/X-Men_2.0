    terms: [build failure, Maven build fails, mvn clean install error, Java Maven issue]
    shortAnswer: |
      Build failures usually come from Java version, Maven installation, dependency download, or local Maven cache issues.
    steps:
      - "Ensure Java 21 or higher is installed."
      - "Run `mvn -version` to verify Maven is installed and using the expected Java."
      - "Check internet access because Maven may need to download dependencies."
      - "If dependencies are corrupted, delete the local `.m2/repository` cache and rebuild."
      - "Re-import the project as a Maven project if the IDE cannot resolve it."
      - "Refresh Maven dependencies and verify the project JDK setting."
    why: |
      X-Men 2.0 relies on Maven and Java 21; if either is wrong, mutation logic may never start.
