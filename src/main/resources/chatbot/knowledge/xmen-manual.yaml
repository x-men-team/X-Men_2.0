  - id: manual.derivation.process
    title: Derivation check process
    category: derivation
    terms: [Derivation process manual, DerivationCheckService, derivability check, Dolev Yao derivation, derive target message, can this message be derived, why derivation failed, how derivability works, build target from knowledge, derivation tree]
    definition: |
      The derivation process checks whether a target message can be built from known messages under Dolev-Yao style symbolic rules.
    steps:
      - "Start with a target message and a list of known messages."
      - "Check whether the target is already known."
      - "Use backward search with a bounded depth to avoid infinite loops."
      - "If a pair is known, derive either component individually."
      - "If ciphertext `{M}K` is known and key `K` can be found, derive `M` by decryption."
      - "For a target pair `(X,Y)`, derive both `X` and `Y`."
      - "For encryption `{M}K`, derive both `M` and `K`."
      - "For function `f(a1,...,an)`, derive every argument."
      - "Fail on an unknown simple atom."
      - "Record the successful or failed proof path in a small derivation tree."
    details:
      - "Repeated goals are tracked so the search does not loop."
      - "If the depth limit is exhausted, that branch fails."
      - "When checking from a rule, the target is taken from the last postcondition's last parameter."
      - "The knowledge set is built from matching rule state values, and forgotten tilde-marked values are excluded."
      - "Setup and channel rules are skipped as special cases."
    why: |
      Derivation checking lets Forget decide whether losing a value really breaks the later message construction or whether the value is still derivable from remaining knowledge.
    related: [manual.forget.algorithm, manual.haskell-derivation-service]
    followups:
