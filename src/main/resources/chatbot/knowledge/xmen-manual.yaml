    shortAnswer: |
      If generated mutations differ from expected outputs, first verify the selected mutation options and then compare generated files with test resources.
    steps:
      - "Confirm the correct mutation headers or options were selected."
      - "Run integration tests with `mvn test` and compare generated outputs with expected resources."
      - "Check output file order before assuming the content is wrong."
      - "A file such as `output4.M` may correspond to an expected file with a different number if ordering changed."
      - "Inspect logs around the specific strategy and propagation path."
    why: |
      Content correctness and file ordering are separate issues; ordering differences do not automatically mean the mutation is wrong.
