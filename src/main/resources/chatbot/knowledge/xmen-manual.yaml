  - id: manual.mutation-strategy
    title: MutationStrategy
    category: architecture
    terms: [MutationStrategy, strategy pattern, mutation strategy interface, SkipMutationStrategy, ForgetMutationStrategy]
    definition: |
      `MutationStrategy` is the common strategy abstraction implemented by specific mutation algorithms.
    details:
      - "Concrete strategies include Skip, Add, Replace, and Forget variants."
      - "The strategy pattern keeps each mutation family isolated."
      - "`MutationStrategyFactory` chooses the correct implementation."
      - "`MutationGeneratorServiceImpl` invokes strategies after input parsing and flag setup."
    why: |
      This design lets new mutation types be added without rewriting the whole generator pipeline.
    related: [manual.mutation-strategy-factory, manual.mutation-generator-service]
    followups:
      - What is MutationStrategyFactory?
      - What mutation types exist?
      - What is ForgetMutationStrategy?
