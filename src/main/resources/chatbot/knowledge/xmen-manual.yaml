    terms: [Forget algorithm manual, Forget(x), sanitize Forget literal, forget set, reacquire forgotten value]
    definition: |
      The Forget algorithm detects `Forget(x)`, removes the literal from Tamarin syntax, updates usable knowledge, checks derivability, and propagates substitutions.
    steps:
      - "Detect every `Forget(x)` literal in agent rules."
      - "Sanitize the input by deleting those literals from the Tamarin-facing syntax."
